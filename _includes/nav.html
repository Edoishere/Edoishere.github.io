<nav class="site-nav">
  <div class="container">
    <a class="site-nav__name" href="{{ '/' | relative_url }}">{{ site.author.name }}</a>
    <ul class="site-nav__links">
      {% for item in site.nav %}
        <li>
          {% assign item_url = item.url %}
          {% assign item_url_index = item.url | append: 'index.html' %}
          <a href="{{ item.url | relative_url }}"
             {% if page.url == item_url or page.url == item_url_index %}class="active"{% endif %}>
            {{ item.title }}
          </a>
        </li>
      {% endfor %}
    </ul>
  </div>
</nav>
